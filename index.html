<!DOCTYPE html>
<html>
    <head>
        <!--Meta data to give the browser information about the website-->
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device, initial-scale=1.0">
        <title>Whack A Bot</title>
        <!--Cascading Style Sheet-->
        <link rel="stylesheet" href="main.css">
        <!-- link javascript -->
        <script src="bots.js" defer></script>
    </head>

    <body>
        <header>
            <h1>Play Whack-a-Bot</h1>
            <h2>Show those robots who's boss</h2>
        </header>

        <main>
            <div class="score">Score: <span id="spnScore"></span></div>
            <div id="gameBoard">
                <!--build six holes for the bots to pop up randomly-->
                <div class="hole"></div>
                <div class="hole"></div>
                <div class="hole"></div>
                <div class="hole"></div>
                <div class="hole"></div>
                <div class="hole"></div>
            </div>

            <button onclick="playGame();">Play Game</button>
        </main>
    </body>
</html>
